type AuthPayload {
  objectId: ID
  sessionToken: String
}

type LoginPayload {
  objectId: ID
  sessionToken: String
  position: String
  firstName: String
}

extend type Mutation {
  register(
    salutation:   String!
    firstName:    String!
    lastName:     String!
    organization: String!
    email:        String!
    password:     String!
    position:     String!
  ): AuthPayload @resolve

  login(
    email:    String!
    password: String!
  ): LoginPayload @resolve
}
