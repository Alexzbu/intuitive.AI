type Query {
  getCourse(id: ID!): Course @resolve
  getCourses(name: String, limit: Int, page: Int): CourseResponse @resolve
  getCoursesByCreator(creatorId: ID!, limit: Int, page: Int): CourseResponse @resolve
  getSections(name: String): [Section] @resolve
  getSection(id: ID!): Section @resolve
  getQuestions(name: String): [Question] @resolve
  getQuestion(id: ID!): Question @resolve
  getQuiz_Questions: [Quiz_Question] @resolve
  getQuiz_Question(id: ID!): Quiz_Question @resolve
  getAnswers: [Answer] @resolve
  isEnrolledInCourse(courseId: ID!, userId: ID!): Boolean @resolve
  getCourseSessionsByCourse(courseId: ID!): [CourseSession] @resolve
}

type CourseResponse {
  totalCourses: Int
  courses: [Course]
}

type CourseSession {
  objectId: ID
  start_date: String
  end_date: String
  schedule: String
  spots_available: Int
  max_spots: Int
  is_active: Boolean
}

type responseNodeType {
  name: String
  content: String
}
type Assistent {
  objectId: ID
  request: String
  response: [responseNodeType]
}
type Mutation {
  addCourse(course: Object, creatorId: ID): Course @resolve
    
  upCourse(
    id: ID!,
    name: String!
    subtitle: String,
    objective: String,
    target_group: String,
    entry_requirements: [String],
    self_assessment: [String],
    target_profile: [String],
    participants_number: String,
    recommendation: String,
    trainer_skills: [String],
    qualifications: [String],
    description: String,
    categories: [String],
    technology: [String],
    language: [String],
    key_words: [String],
    isFree: Boolean,
    price: String,
    thumbnail: String,
    duration_hours: String,
    location: String,
    contents: String,
    registration_deadline: String,
    what_you_learn: [String],
    further_information: String,
    ): Course @resolve
    
  delCourse(id: ID!): Course @resolve
  enrollInCourse(courseId: ID!, userId: ID!): Object @resolve

  addCourseSession(courseId: ID!, start_date: String, end_date: String, schedule: String, spots_available: Int, max_spots: Int): CourseSession @resolve
  upCourseSession(id: ID!, start_date: String, end_date: String, schedule: String, spots_available: Int, max_spots: Int, is_active: Boolean): CourseSession @resolve
  delCourseSession(id: ID!): CourseSession @resolve

  addSection(course_id: ID!, name: String!): Section @resolve
  upSection(id: ID!, name: String!): Section @resolve
  delSection(id: ID!): Section @resolve

  addQuestion(
    section_id: ID!,
    name: String!,
    question_type: String!,
    video_name: String,
    video_link: String, 
    file_name: String,
    file: String,
    quiz_name: String
    ): Question @resolve

  upQuestion(id: ID!,
    name: String,
    video_name: String,
    video_link: String,
    file_name: String,
    file: String,
    quiz_name: String
    ): Question @resolve

  delQuestion(id: ID!): Question @resolve

  addQuiz_Question(
    question_id: ID!,
    name: String!,
    answer_explenetion: String
    ): Quiz_Question @resolve

  upQuiz_Question(
    id: ID!,
    name: String,
    answer_explenetion: String
    ): Quiz_Question @resolve

  delQuiz_Question(id: ID!): Quiz_Question @resolve

  addAnswer(
    quiz_question_id: ID!,
    name: String!,
    isCorrect: Boolean
    ): Answer @resolve

  upAnswer(
    id: ID!,
    name: String!,
    isCorrect: Boolean
    ): Answer @resolve

  delAnswer(id: ID!): Answer @resolve

  aiAssistent(prompt: String, inputId: String, questionsHistory: String, resObjectsHistory: String): Object @resolve
  addAiAssistentHistory(course_id: ID, questionsHistory: String, resObjectsHistory: [Object]): Object @resolve
  getAiAssistentHistory(prompt: String!): [Assistent] @resolve

  generateCourseTitles(
    language: String,
    targetAudience: String,
    goal: String,
    duration: String,
    description: String,
    expertiseLevel: String,
    styleTone: String,
    topics: String,
    additionalConstraints: String
  ): [String] @resolve

  generateCourseOutline(
    language: String,
    targetAudience: String,
    goal: String,
    duration: String,
    description: String,
    expertiseLevel: String,
    styleTone: String,
    topics: String,
    additionalConstraints: String,
    courseTitle: String
  ): [Object] @resolve

}
